<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>ISEC Communication Log</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* 59 Days varumärkesfärger */
  --graphite: #2B2C2E;
  --soft-white: #F7F8F9;
  --bone: #E5E6E7;
  --petrol: #214946;
  --silver: #C5C7C9;

  --bg: #ffffff;
  --bg-secondary: #F7F8F9;
  --bg-tertiary: #EDEEEF;
  --text: #2B2C2E;
  --text-secondary: #5f6166;
  --text-tertiary: #9498a0;
  --border: rgba(43,44,46,0.10);
  --border-secondary: rgba(43,44,46,0.20);
  --radius-md: 6px;
  --radius-lg: 10px;
  --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --serif: 'Cormorant Garamond', Georgia, serif;
}

body {
  font-family: var(--font);
  color: var(--text);
  background: var(--bg-tertiary);
  min-height: 100vh;
  padding: 0;
}

.container { max-width: 820px; margin: 0 auto; padding: 0 1.5rem 3rem; }

/* Märkesheader i Deep Graphite */
.brandbar {
  background: var(--graphite);
  padding: 1.4rem 0 1.5rem;
  margin-bottom: 2rem;
}
.brandbar-inner {
  max-width: 820px; margin: 0 auto; padding: 0 1.5rem;
  display: flex; align-items: center; justify-content: space-between;
}
.brandbar .logo-isec { height: 30px; display: block; }
.brandbar-right { display: flex; align-items: center; gap: 10px; }
.brandbar-by { font-size: 10px; color: var(--silver); letter-spacing: 0.8px; text-transform: uppercase; }
.brandbar .logo-days { height: 22px; display: block; opacity: 0.95; }
@media (max-width: 500px) {
  .brandbar-by { display: none; }
  .brandbar .logo-isec { height: 26px; }
  .brandbar .logo-days { height: 19px; }
}

.header {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  padding-bottom: 1rem;
  border-bottom: 1px solid var(--graphite);
  margin-bottom: 1.75rem;
}
.header h1 { font-family: var(--serif); font-size: 34px; font-weight: 600; letter-spacing: -0.3px; line-height: 1; color: var(--graphite); }
.header p { font-size: 13px; color: var(--text-secondary); margin-top: 6px; }
.year-badge {
  font-size: 12px; color: var(--petrol); font-weight: 500;
  border: 1px solid var(--petrol); border-radius: 2px;
  padding: 3px 10px; white-space: nowrap; letter-spacing: 0.5px;
}

.stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 1.75rem; }
@media (max-width: 500px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } }
.stat-card { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 14px 16px; }
.stat-card .label { font-size: 11px; color: var(--text-secondary); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
.stat-card .value { font-family: var(--serif); font-size: 30px; font-weight: 600; color: var(--graphite); line-height: 1; }

.filter-row { display: flex; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
.filter-btn {
  font-size: 12px; padding: 5px 13px;
  border: 1px solid var(--border); border-radius: 2px;
  cursor: pointer; background: none; color: var(--text-secondary); font-family: var(--font);
  transition: all 0.12s;
}
.filter-btn.active { background: var(--graphite); color: #fff; border-color: var(--graphite); }
.filter-btn:hover:not(.active) { border-color: var(--petrol); color: var(--petrol); }
#initiativ-filters { margin-bottom: 1.25rem; }

.section-label {
  font-family: var(--serif); font-size: 18px; font-weight: 600; color: var(--graphite);
  letter-spacing: 0; margin: 1.75rem 0 10px; text-transform: capitalize;
}

.activity-list { display: flex; flex-direction: column; gap: 8px; }
.activity-item {
  background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-md);
  padding: 14px 18px; display: grid; grid-template-columns: 80px 1fr auto; gap: 14px; align-items: start;
  transition: border-color 0.12s;
}
.activity-item:hover { border-color: var(--silver); }
@media (max-width: 500px) {
  .activity-item { grid-template-columns: 1fr auto; }
  .activity-date { display: none; }
}
.activity-date { font-size: 12px; color: var(--text-tertiary); padding-top: 2px; }
.activity-body .title { font-size: 14px; font-weight: 600; color: var(--graphite); }
.activity-body .note { font-size: 12.5px; color: var(--text-secondary); margin-top: 5px; line-height: 1.55; }

.badge { font-size: 10px; padding: 3px 9px; border-radius: 2px; white-space: nowrap; text-transform: uppercase; letter-spacing: 0.4px; font-weight: 500; }
.badge-linkedin   { background: var(--bone); color: var(--petrol); }
.badge-li-rapport { background: var(--bone); color: var(--petrol); }
.badge-event      { background: var(--petrol); color: #fff; }
.badge-nyhetsbrev { background: var(--bone); color: var(--graphite); }
.badge-landningssida { background: var(--soft-white); color: var(--text-secondary); border: 1px solid var(--border); }
.badge-övrigt     { background: var(--soft-white); color: var(--text-tertiary); border: 1px solid var(--border); }

.initiativ-tag {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 11px; padding: 2px 8px; border-radius: 2px;
  background: var(--soft-white); color: var(--petrol); margin-top: 7px;
  border: 1px solid var(--border);
}
.initiativ-tag i { font-size: 12px; }

.empty-state { text-align: center; padding: 3rem 1rem; color: var(--text-tertiary); }
.empty-state i { font-size: 32px; display: block; margin-bottom: 12px; }
.empty-state p { font-size: 14px; }

.footer { font-size: 11px; color: var(--text-tertiary); margin-top: 2.5rem; padding-top: 1.5rem; border-top: 1px solid var(--border); letter-spacing: 0.3px; }

#gate {
  position: fixed; inset: 0; z-index: 9999;
  background: var(--graphite);
  display: flex; align-items: center; justify-content: center;
}
#gate .gate-box {
  background: var(--bg); border: none;
  border-radius: var(--radius-md); padding: 2.25rem; width: 340px; max-width: 90vw;
  text-align: center;
}
#gate h2 { font-family: var(--serif); font-size: 26px; font-weight: 600; margin-bottom: 6px; color: var(--graphite); }
#gate p { font-size: 13px; color: var(--text-secondary); margin-bottom: 1.4rem; }
#gate input {
  width: 100%; font-size: 14px; padding: 10px 12px; margin-bottom: 10px;
  border: 1px solid var(--border); border-radius: var(--radius-md);
  background: var(--bg); color: var(--text); font-family: var(--font);
}
#gate input:focus { outline: none; border-color: var(--petrol); }
#gate button {
  width: 100%; background: var(--graphite); color: #fff; border: none;
  border-radius: var(--radius-md); padding: 10px; font-size: 14px; font-weight: 500;
  cursor: pointer; font-family: var(--font); transition: background 0.12s;
}
#gate button:hover { background: var(--petrol); }
#gate .err { font-size: 12px; color: #c0392b; margin-top: 8px; min-height: 14px; }
#main-content { display: none; }
</style>
</head>

    <button onclick="checkGate()">Logga in</button>

function typeLabel(type) {
  const map = { linkedin:'LinkedIn', 'li-rapport':'LinkedIn-rapport', event:'Event', nyhetsbrev:'Nyhetsbrev', landningssida:'Webb', 'övrigt':'Övrigt' };
  return map[type] || type;
}

function renderInitiativFilters() {
  const initiativs = [...new Set(activities.map(a => a.initiativ).filter(Boolean))].sort();
  const container = document.getElementById('initiativ-filters');
  if (initiativs.length === 0) { container.innerHTML = ''; return; }
  let html = `<button class="filter-btn ${currentInitiativ==='alla'?'active':''}" onclick="filterInitiativ('alla', this)"><i class="ti ti-tags" aria-hidden="true" style="font-size:12px;"></i> Alla initiativ</button>`;
  initiativs.forEach(i => {
    html += `<button class="filter-btn ${currentInitiativ===i?'active':''}" onclick="filterInitiativ('${i.replace(/'/g,"\\'")}', this)">${i}</button>`;
  });
  container.innerHTML = html;
}

function renderLog() {
  renderInitiativFilters();
  const container = document.getElementById('activity-container');
  let filtered = activities;
  if (currentFilter !== 'alla') {
    if (currentFilter === 'linkedin') {
      filtered = filtered.filter(a => a.type === 'linkedin' || a.type === 'li-rapport');
    } else {
      filtered = filtered.filter(a => a.type === currentFilter);
    }
  }
  if (currentInitiativ !== 'alla') filtered = filtered.filter(a => a.initiativ === currentInitiativ);
  filtered = [...filtered].sort((a,b) => b.date.localeCompare(a.date));

  document.getElementById('stat-li').textContent     = stats.linkedinPosts;
  document.getElementById('stat-impr').textContent   = stats.impressions.toLocaleString('sv-SE');
  document.getElementById('stat-clicks').textContent = stats.clicks.toLocaleString('sv-SE');
  document.getElementById('stat-event').textContent  = stats.events;

  if (filtered.length === 0) {
    container.innerHTML = '<div class="empty-state"><i class="ti ti-inbox" aria-hidden="true"></i><p>Inga aktiviteter här ännu.</p></div>';
    return;
  }

  const months = {};
  filtered.forEach(a => {
    const d = new Date(a.date + 'T12:00:00');
    const key = d.toLocaleDateString('sv-SE', {year:'numeric', month:'long'});
    if (!months[key]) months[key] = [];
    months[key].push(a);
  });

  let html = '';
  Object.entries(months).forEach(([month, items]) => {
    html += `<div class="section-label">${month}</div><div class="activity-list">`;
    items.forEach(a => {
      const d = new Date(a.date + 'T12:00:00');
      const dateStr = d.toLocaleDateString('sv-SE', {day:'numeric', month:'short'});
      html += `<div class="activity-item">
        <div class="activity-date">${dateStr}</div>
        <div class="activity-body">
          <div class="title">${a.title}</div>
          ${a.note ? `<div class="note">${a.note}</div>` : ''}
          ${a.initiativ ? `<span class="initiativ-tag"><i class="ti ti-tag" aria-hidden="true"></i>${a.initiativ}</span>` : ''}
        </div>
        <span class="badge badge-${a.type}">${typeLabel(a.type)}</span>
      </div>`;
    });
    html += '</div>';
  });
  container.innerHTML = html;
}

function filterActivities(type, btn) {
  currentFilter = type;
  document.querySelectorAll('#type-filters .filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderLog();
}

function filterInitiativ(initiativ, btn) {
  currentInitiativ = initiativ;
  document.querySelectorAll('#initiativ-filters .filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderLog();
}
